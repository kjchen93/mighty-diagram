name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed for the GitHub Release step
  id-token: write # REQUIRED for npm OIDC trusted publishing (tokenless)

jobs:
  publish-cli:
    name: Publish CLI to npm + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # ships npm 11; OIDC needs npm >= 11.5.1
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: Ensure npm supports OIDC
        run: npm install -g npm@latest
      - name: Build CLI
        working-directory: cli
        run: |
          npm ci
          npm run build
      - name: Publish to npm (OIDC, tokenless)
        working-directory: cli
        run: npm publish # no NODE_AUTH_TOKEN; auth via OIDC trusted publisher, provenance auto-attaches
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES" ]; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file "$NOTES"
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi
