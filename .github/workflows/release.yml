name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish-cli:
    name: Publish CLI to npm + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: Build CLI
        working-directory: cli
        run: |
          npm ci
          npm run build
      - name: Publish to npm
        working-directory: cli
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "See CHANGELOG.md for details."
