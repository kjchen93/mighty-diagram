name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skill:
    name: Validate skill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Frontmatter, JSON & reference paths
        run: node scripts/validate.mjs
      - name: SVGs well-formed
        run: python3 scripts/validate_svgs.py

  cli:
    name: Build & smoke-test CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run smoke
