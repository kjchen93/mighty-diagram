<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="708" height="460" viewBox="0 0 708 460"
     role="img" aria-labelledby="t d">
  <title id="t">Example Voting App architecture</title>
  <desc id="d">Front-tier web apps (Vote, Result) and back-tier services (Redis queue, .NET
    Worker, PostgreSQL) inside a Docker Compose deployment. A user's vote flows Vote App to
    Redis to Worker to PostgreSQL, and the Result app reads PostgreSQL to show live tallies.
    Rendered in the reference palette.</desc>

  <style>
    :root {
      --canvas:        #ffffff;
      --frame:         #8B1E2D;
      --group-fill:    #f5f5f5;
      --group-stroke:  #e5e5e5;
      --title:         #1a1a1a;
      --subgroup:      #2563eb;
      --subgroup-fill: #eff6ff;
      --icon:          #555555;
      --accent:        #ff8c1a;
      --label:         #333333;
    }
    .canvas    { fill: var(--canvas); }
    .frame     { fill: none; stroke: var(--frame); stroke-width: 2; }
    .frame-tag { fill: var(--canvas); stroke: var(--frame); stroke-width: 1.5; }
    .frame-txt { fill: var(--frame); font-weight: 700; font-size: 11px;
                 letter-spacing: 0.08em; text-transform: uppercase; }
    .group     { fill: var(--group-fill); stroke: var(--group-stroke); stroke-width: 1; }
    .title     { fill: var(--title); font-weight: 700; font-size: 15px; }
    .subgroup  { fill: var(--subgroup-fill); stroke: var(--subgroup); stroke-width: 1.5;
                 stroke-dasharray: 6 4; }
    .subtitle  { fill: var(--subgroup); font-weight: 600; font-size: 12px; }
    .label     { fill: var(--label); font-size: 12px; font-weight: 500; }
    .edge      { fill: none; stroke: var(--accent); stroke-width: 2; }
    .icon-svg  { stroke: var(--icon); stroke-width: 1.4; fill: none;
                 stroke-linecap: round; stroke-linejoin: round; overflow: visible; }
    text       { font-family: Inter, "Segoe UI", system-ui, Helvetica, Arial, sans-serif; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
    </marker>
  </defs>

  <rect class="canvas" x="0" y="0" width="708" height="460"/>

  <!-- Outer deployment frame -->
  <rect class="frame" x="30" y="28" width="648" height="404" rx="6"/>
  <rect class="frame-tag" x="540" y="418" width="138" height="24" rx="4"/>
  <text class="frame-txt" x="609" y="434" text-anchor="middle">Docker Compose</text>

  <!-- ===== Group: Front Tier (web). Icons face center; labels on the left. ===== -->
  <rect class="group" x="60" y="64" width="260" height="336" rx="10"/>
  <text class="title" x="190" y="92" text-anchor="middle">Front Tier · Web</text>

  <g class="node">
    <svg class="icon-svg" x="240" y="144" width="42" height="42" viewBox="0 0 24 24">
      <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 4v4"/><path d="M2 8h20"/><path d="M6 4v4"/>
    </svg>
    <text class="label" x="228" y="170" text-anchor="end">Vote App · Flask</text>
  </g>
  <g class="node">
    <svg class="icon-svg" x="240" y="318" width="42" height="42" viewBox="0 0 24 24">
      <rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>
    </svg>
    <text class="label" x="228" y="344" text-anchor="end">Result App · Node</text>
  </g>

  <!-- ===== Group: Back Tier (services). Icons face center; labels on the right. ===== -->
  <rect class="group" x="380" y="64" width="260" height="336" rx="10"/>
  <text class="title" x="510" y="92" text-anchor="middle">Back Tier · Services</text>

  <!-- dashed sub-group: async vote pipeline -->
  <rect class="subgroup" x="400" y="110" width="220" height="190" rx="8"/>
  <text class="subtitle" x="510" y="130" text-anchor="middle">Async Pipeline</text>

  <g class="node">
    <svg class="icon-svg" x="430" y="144" width="42" height="42" viewBox="0 0 24 24">
      <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
    </svg>
    <text class="label" x="485" y="170" text-anchor="start">Redis · queue</text>
  </g>
  <g class="node">
    <svg class="icon-svg" x="430" y="224" width="42" height="42" viewBox="0 0 24 24">
      <path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>
    </svg>
    <text class="label" x="485" y="250" text-anchor="start">Worker · .NET</text>
  </g>

  <g class="node">
    <svg class="icon-svg" x="430" y="318" width="42" height="42" viewBox="0 0 24 24">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>
    </svg>
    <text class="label" x="485" y="344" text-anchor="start">PostgreSQL</text>
  </g>

  <!-- ===== Flow arrows (orange). Spine runs at x=451, clear of labels. ===== -->
  <path class="edge" d="M286,165 H426"   marker-end="url(#arrow)"/>  <!-- vote -> redis (rpush 'votes') -->
  <path class="edge" d="M451,188 V220"   marker-end="url(#arrow)"/>  <!-- redis -> worker (consume) -->
  <path class="edge" d="M451,268 V314"   marker-end="url(#arrow)"/>  <!-- worker -> postgres (store) -->
  <path class="edge" d="M426,339 H286"   marker-end="url(#arrow)"/>  <!-- postgres -> result (read) -->
</svg>
